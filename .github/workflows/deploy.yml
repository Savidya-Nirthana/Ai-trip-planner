name: Deploy to EC2

on:
  push:
    branches:
      - main # Trigger the workflow when code is pushed to the main branch
  pull_request:
    branches:
      - main # Run CI tests on pull requests targeting main

jobs:
  test:
    name: Run CI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      # Add test commands here, for example:
      # - name: Run Pytest
      #   run: uv run pytest tests/

  deploy:
    name: Deploy to EC2
    needs: test # Depends on the test job passing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install uv if not already installed
            if ! command -v uv &> /dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
            export PATH="$HOME/.cargo/bin:$PATH"

            # Clone repo if it doesn't exist, otherwise pull latest
            if [ ! -d ~/ai_trip_planner ]; then
              git clone https://github.com/${{ github.repository }}.git ~/ai_trip_planner
            fi
            cd ~/ai_trip_planner

            git pull origin main

            # Sync dependencies using uv (uses uv.lock for reproducible installs)
            uv sync --frozen

            # Restart both services
            sudo systemctl restart fastapi
            sudo systemctl restart streamlit
